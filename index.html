<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena — تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
</head>
<body>
    <div class="background-effects">
        <video autoplay muted loop id="bg-video">
            <source src="https://v.ftcdn.net/05/26/51/87/700_F_526518711_3j8p3IqW4UoYv4L7XpYvY8UoY8UoY8Uo_ST.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
        <div id="mouse-glow"></div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h2 style="font-size: 20px;">إنشاء حساب جديد</h2>
                <button class="modal-close" onclick="closeRegisterModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="reg-username" placeholder="اختر اسماً" />
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="reg-password" placeholder="اختر كلمة مرور" />
                </div>
                <div class="form-group">
                    <label>كود التوثيق (خاص بالمنظمة)</label>
                    <input type="text" id="reg-code" placeholder="أدخل كود التوثيق المعتمد" />
                </div>
                <button class="login-btn" onclick="handleRegister()">توثيق وإنشاء الحساب</button>
                <div id="reg-msg" style="margin-top:10px; font-size:13px; text-align:center;"></div>
            </div>
        </div>
    </div>

    <div class="success-overlay" id="successOverlay">
        <div class="success-icon">✓</div>
        <h2 id="successUser">مرحباً بك مجدداً!</h2>
        <p>جاري توجيهك إلى المنصة...</p>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <div class="login-container" id="app">
        <div id="bear">
            <div id="head">
                <div id="eyes" :style="{transform: 'translate(' + eye.x + 'px,' + eye.y + 'px)'}">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div id="facial" :style="{transform: 'translate(' + facial.x + 'px,' + facial.y + 'px)'}">
                    <div id="nose"></div>
                    <div id="mouth"></div>
                </div>
                <div id="ears">
                    <div class="ear"></div>
                    <div class="ear"></div>
                </div>
            </div>
        </div>

        <h2 class="arena-logo-glow">Arena</h2>
        <p class="subtitle">مستقبل تقييم الموارد البشرية</p>
        
        <form id="loginForm" @submit.prevent="handleLogin">
            <div class="form-group">
                <label>اسم المستخدم</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="اسم المستخدم" v-model="username" required>            <i class="fa-solid fa-user"></i>
                </div>
                <span id="emailError"></span>
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" id="password" required placeholder="••••••••">
                    <i class="fa-solid fa-lock"></i>
                </div>
            </div>

            <button type="submit" class="login-btn">تسجيل الدخول</button>
        </form>

        <div class="divider">
            <span>أو</span>
        </div>

        <div class="social-login">
            <button class="social-btn" style="flex: 1;" onclick="openRegisterModal()">
                <i class="fa-solid fa-user-plus"></i>
                إنشاء حساب جديد
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
