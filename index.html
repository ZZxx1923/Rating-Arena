<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Minimalist Login Form</title>
    <meta name="description" content="Dark-theme login form with glowing neon accents, parallax orbs and crisp focus states.">
    <meta name="author" content="Aigars Silkalns / Colorlib">
    <link rel="canonical" href="https://puikinsh.github.io/login-forms/forms/neon/">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%236366f1'/><text x='50' y='68' font-size='60' text-anchor='middle' fill='white' font-family='system-ui,sans-serif'>L</text></svg>">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Neon Minimalist Login Form">
    <meta property="og:description" content="Dark-theme login form with glowing neon accents, parallax orbs and crisp focus states.">
    <meta property="og:url" content="https://puikinsh.github.io/login-forms/forms/neon/">
    <meta property="og:image" content="https://puikinsh.github.io/login-forms/assets/screenshots/neon.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Neon Minimalist Login Form">
    <meta name="twitter:description" content="Dark-theme login form with glowing neon accents, parallax orbs and crisp focus states.">
    <meta name="twitter:image" content="https://puikinsh.github.io/login-forms/assets/screenshots/neon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Aurora Background -->
  <div class="aurora-bg"></div>
  <div class="aurora-grid"></div>
  <div class="aurora-noise"></div>
  <div class="aurora-particles" id="particles"></div>

    <div class="success-overlay" id="successOverlay">
        <div class="success-card">
            <div class="success-icon-wrap">✓</div>
            <h2 id="successUser">Welcome back!</h2>
            <p>Redirecting to Arena...</p>
            <div style="width: 100%; height: 4px; background: #f1f5f9; border-radius: 2px; margin-top: 24px; overflow: hidden;">
                <div id="progressBar" style="width: 0%; height: 100%; background: #22c55e; transition: width 2s linear;"></div>
            </div>
        </div>
    </div>

    <div class="login-container">
        <div class="background-effects">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
        </div>
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">A</div>
                <h2>Arena</h2>
                <p>The Future of Performance</p>
            </div>
            
            <form class="login-form" id="loginForm" novalidate>
                <div class="form-group">
                    <div class="input-wrapper">
                        <input 
type="text" 
id="username" 
name="username" 
required
autocomplete="username"
>
                        <label for="email">Email</label>
                        <span class="input-line"></span>
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                        <label for="password">Password</label>
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                            <span class="toggle-icon"></span>
                        </button>
                        <span class="input-line"></span>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <div class="remember-wrapper">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember" class="checkbox-label">
                            <span class="custom-checkbox"></span>
                            Keep me signed in
                        </label>
                    </div>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn btn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader"></span>
                    <span class="btn-glow"></span>
                </button>
            </form>

            <div class="divider">
                <span>or</span>
            </div>

            <div class="social-login">
                <button type="button" class="social-btn google-btn">
                    <span class="social-icon google-icon"></span>
                    <span>Continue with Google</span>
                </button>
                <button type="button" class="social-btn apple-btn">
                    <span class="social-icon apple-icon"></span>
                    <span>Continue with Apple</span>
                </button>
            </div>

            <div class="signup-link">
                <p>New here? <a href="#">Create an account</a></p>
            </div>

            <!-- Success Overlay will be handled by JS -->

        </div>
        
        <div class="background-effects">
            <div class="glow-orb glow-orb-1"></div>
            <div class="glow-orb glow-orb-2"></div>
            <div class="glow-orb glow-orb-3"></div>
        </div>
    </div>

    <script src="../../shared/js/form-utils.js"></script>
    <script src="script.js"></script>
        


  <script>
    // Generate floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 28; i++) {
      const d = document.createElement('div');
      d.className = 'p-dot';
      const size = Math.random() * 3 + 1;
      d.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        animation-duration:${12 + Math.random()*20}s;
        animation-delay:${Math.random()*15}s;
        opacity:${0.2 + Math.random()*0.5};
      `;
      container.appendChild(d);
    }
    // Cursor aurora glow
    document.addEventListener('mousemove', e => {
      document.documentElement.style.setProperty('--mx', e.clientX + 'px');
      document.documentElement.style.setProperty('--my', e.clientY + 'px');
    });
  </script>

</body>
</html>
