<!DOCTYPE html>
<html lang="ar" data-theme="dark" data-lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arena — Premium Evaluation Platform</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
</head>
<body class="role-admin" id="body-root">

  <header class="fimro-header">
    <div class="header-container">
      <div class="header-left">
        <div class="fimro-logo"><span class="arena-text arena-logo-glow">Arena</span></div>
      </div>
      <div class="header-right" style="display: flex; align-items: center; gap: 15px;">
        <div class="theme-toggle">
          <button class="theme-toggle-btn" onclick="toggleTheme()" id="theme-toggle-btn"><i class="fa-solid fa-sun"></i></button>
        </div>
        <div class="header-lang-toggle">
          <button class="lang-toggle-btn" onclick="toggleLanguage()"><i class="fa-solid fa-globe"></i> <span id="lang-label">AR</span></button>
        </div>
      </div>
    </div>
  </header>

  <div class="page app-shell" id="app-shell">
    <aside class="fimro-sidebar">
      <a href="javascript:void(0)" class="sidebar-icon role-admin-only" id="sidebar-dashboard" onclick="switchSection('dashboard')" title="Dashboard"><i class="fa-solid fa-house"></i></a>
      <a href="javascript:void(0)" class="sidebar-icon" id="sidebar-evaluations" onclick="switchSection('evaluations')" title="Evaluations"><i class="fa-solid fa-star"></i></a>
      <a href="javascript:void(0)" class="sidebar-icon" id="sidebar-submit-eval" onclick="switchSection('submit-eval')" title="Submit"><i class="fa-solid fa-pen-to-square"></i></a>
      <a href="javascript:void(0)" class="sidebar-icon role-admin-only" id="sidebar-settings" onclick="switchSection('settings')" title="Settings"><i class="fa-solid fa-gear"></i></a>
      <a href="javascript:void(0)" class="sidebar-icon role-admin-only" id="sidebar-users" onclick="switchSection('users')" title="Users"><i class="fa-solid fa-users-gear"></i></a>
      <a href="javascript:void(0)" class="sidebar-icon logout" onclick="logout()" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></a>
    </aside>

    <main class="fimro-main">
      <!-- SECTION: SUBMIT EVAL -->
      <section class="content-section" id="section-submit-eval">
        <div class="multistep-container">
          <div class="card multistep-card">
            <div class="progress-bar-container" style="margin-bottom:30px; background:rgba(255,255,255,0.05); height:8px; border-radius:10px; overflow:hidden;">
              <div class="progress-fill" id="form-progress" style="width: 33.33%; background:var(--primary); height:100%; transition:0.3s;"></div>
            </div>
            <form id="evaluation-form" onsubmit="return false;">
              <div class="form-step active" id="step-1">
                <h2 style="margin-bottom:20px;">من تريد أن تقيم؟</h2>
                <div class="eval-options-grid-fimro">
                  <label class="fimro-opt">
                    <input type="radio" name="eval-target" value="employee" checked onchange="updateEvalTargetUI()" />
                    <div class="opt-box"><i class="fa-solid fa-user"></i><br><span>موظف</span></div>
                  </label>
                  <label class="fimro-opt">
                    <input type="radio" name="eval-target" value="department" onchange="updateEvalTargetUI()" />
                    <div class="opt-box"><i class="fa-solid fa-building"></i><br><span>قسم</span></div>
                  </label>
                </div>
                <select class="fimro-select" id="target-dropdown" style="margin-bottom:20px;"><option value="">اختر...</option></select>
                <button type="button" class="btn-fimro-primary" style="width:100%" onclick="nextStep(2)">التالي</button>
              </div>
              <div class="form-step" id="step-2">
                <h2 style="margin-bottom:20px;">الجودة والأداء</h2>
                <div id="dynamic-questions-container"></div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                  <button type="button" class="btn-fimro-primary" style="flex:1; background:var(--text-dim)" onclick="nextStep(1)">السابق</button>
                  <button type="button" class="btn-fimro-primary" style="flex:2" onclick="nextStep(3)">التالي</button>
                </div>
              </div>
              <div class="form-step" id="step-3">
                <div id="bear">
                  <div id="head">
                    <div id="eyes" :style="{transform: 'translate(' + eye.x + 'px,' + eye.y + 'px)'}"><div class="eye"></div><div class="eye"></div></div>
                    <div id="facial" :style="{transform: 'translate(' + facial.x + 'px,' + facial.y + 'px)'}"><div id="nose"></div><div id="mouth"></div></div>
                    <div id="ears"><div class="ear"></div><div class="ear"></div></div>
                  </div>
                </div>
                <h2 style="text-align:center; margin-bottom:15px;">الملاحظات النهائية</h2>
                <textarea class="fimro-textarea" v-model="commentText" id="eval-comment" rows="4" placeholder="اكتب ملاحظاتك هنا..."></textarea>
                <div style="margin:15px 0; display:flex; align-items:center; gap:10px;">
                  <input type="checkbox" id="anonymous-eval"> <label for="anonymous-eval">إرسال كتقييم مجهول</label>
                </div>
                <div style="display:flex; gap:10px;">
                  <button type="button" class="btn-fimro-primary" style="flex:1; background:var(--text-dim)" onclick="nextStep(2)">السابق</button>
                  <button type="button" class="btn-fimro-primary" style="flex:2" onclick="submitEvaluation()">إرسال التقييم</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </section>

      <!-- SECTION: DASHBOARD -->
      <section class="content-section" id="section-dashboard">
        <div class="dashboard-wrapper">
          <div class="hero-content"><h1>لوحة التحكم</h1><p>مرحباً بك مجدداً في Arena</p></div>
          <div class="hero-stats">
            <div class="h-stat"><span id="total-evals-count">0</span><label>الإجمالي</label></div>
            <div class="h-stat"><span id="pending-evals-count">0</span><label>المعلقة</label></div>
          </div>
        </div>
        <div class="admin-tabs-fimro">
          <button class="tab-btn active" onclick="switchAdminTab('pending')">المعلقة</button>
          <button class="tab-btn" onclick="switchAdminTab('completed')">المكتملة</button>
        </div>
        <div class="card" style="overflow-x:auto"><table class="fimro-table"><thead><tr><th>التاريخ</th><th>الهدف</th><th>النتيجة</th><th>الملاحظة</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody id="admin-eval-table-body"></tbody></table></div>
      </section>

      <!-- SECTION: EVALUATIONS -->
      <section class="content-section" id="section-evaluations">
        <h2 style="margin-bottom:24px;">التقييمات المعتمدة</h2>
        <div class="eval-grid-fimro" id="public-eval-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:20px;"></div>
      </section>

      <!-- SECTION: USERS -->
      <section class="content-section" id="section-users">
        <div class="card">
          <h2 style="margin-bottom:20px;">إدارة المستخدمين</h2>
          <table class="fimro-table"><thead><tr><th>المستخدم</th><th>الصلاحية</th><th>رؤية النتائج</th><th>إجراء</th></tr></thead><tbody id="users-table-body"></tbody></table>
        </div>
      </section>

      <!-- SECTION: SETTINGS -->
      <section class="content-section" id="section-settings">
        <div class="card">
          <h2 style="margin-bottom:20px;"><i class="fa-solid fa-building-user"></i> إدارة المنظمة</h2>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
            <div>
              <h3>الموظفون</h3>
              <div style="display:flex; gap:10px; margin:10px 0;"><input type="text" id="new-employee-name" class="fimro-input" placeholder="اسم الموظف"><button class="btn-fimro-primary" onclick="addEmployee()">إضافة</button></div>
              <div id="employees-list" style="max-height:200px; overflow-y:auto; background:rgba(255,255,255,0.05); padding:10px; border-radius:12px;"></div>
            </div>
            <div>
              <h3>الأقسام</h3>
              <div style="display:flex; gap:10px; margin:10px 0;"><input type="text" id="new-department-name" class="fimro-input" placeholder="اسم القسم"><button class="btn-fimro-primary" onclick="addDepartment()">إضافة</button></div>
              <div id="departments-list" style="max-height:200px; overflow-y:auto; background:rgba(255,255,255,0.05); padding:10px; border-radius:12px;"></div>
            </div>
          </div>
        </div>
        <div class="card">
          <h2 style="margin-bottom:20px;"><i class="fa-solid fa-list-check"></i> إدارة الأسئلة</h2>
          <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="text" id="new-question-ar" class="fimro-input" placeholder="السؤال بالعربي">
            <input type="text" id="new-question-en" class="fimro-input" placeholder="English Translation">
            <button class="btn-fimro-primary" onclick="addQuestion()">إضافة</button>
          </div>
          <div id="questions-list" style="max-height:300px; overflow-y:auto; background:rgba(255,255,255,0.05); padding:10px; border-radius:12px;"></div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="evalModal"><div class="modal-content"><h2 id="modalTarget" style="margin-bottom:15px"></h2><div id="modalQuestionsRatings" style="margin-bottom:20px"></div><p id="modalComment" style="background:rgba(0,0,0,0.05); padding:15px; border-radius:12px; margin-bottom:20px"></p><button class="btn-fimro-primary" style="width:100%" onclick="closeEvalModal()">إغلاق</button></div></div>

  <script>
    const API = 'https://arena-server-c8xo.onrender.com';
    let currentUser = JSON.parse(sessionStorage.getItem('arena_user')) || { username: 'Guest', role: 'user' };
    let evaluations = [];
    let currentAdminTab = 'pending';

    document.addEventListener('DOMContentLoaded', () => {
      if (!sessionStorage.getItem('arena_user')) { window.location.href = '../index.html'; return; }
      checkRole();
      loadEvaluations();
      updateEvalTargetUI();
      loadUsers();
      loadEmployees();
      loadDepartments();
      loadQuestions();
      
      switchSection(currentUser.role === 'admin' ? 'dashboard' : 'submit-eval');
      
      // Default Dark Mode
      const savedTheme = localStorage.getItem('arena-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      updateThemeIcon(savedTheme);
    });

    function checkRole() { document.getElementById('body-root').className = currentUser.role === 'admin' ? 'role-admin' : 'role-user'; }
    function switchSection(id) {
      document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
      const target = document.getElementById('section-' + id);
      if (target) target.classList.add('active');
      document.querySelectorAll('.sidebar-icon').forEach(i => i.classList.remove('active'));
      const icon = document.getElementById('sidebar-' + id);
      if (icon) icon.classList.add('active');
    }

    function toggleLanguage() {
      const current = document.documentElement.getAttribute('data-lang') || 'ar';
      const next = current === 'ar' ? 'en' : 'ar';
      document.documentElement.setAttribute('data-lang', next);
      document.documentElement.setAttribute('dir', next === 'ar' ? 'rtl' : 'ltr');
      document.getElementById('lang-label').textContent = next.toUpperCase();
      localStorage.setItem('arena-lang', next);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('arena-theme', next);
      updateThemeIcon(next);
    }

    function updateThemeIcon(theme) {
      const btn = document.getElementById('theme-toggle-btn');
      if (btn) btn.innerHTML = theme === 'light' ? '<i class="fa-solid fa-moon"></i>' : '<i class="fa-solid fa-sun"></i>';
    }

    async function loadEvaluations() {
      try {
        const res = await fetch(`${API}/evaluations`);
        evaluations = await res.json();
        renderAdminTable();
        renderPublicGrid();
      } catch(e) { console.error(e); }
    }

    function renderAdminTable() {
      const tbody = document.getElementById('admin-eval-table-body');
      if (!tbody) return;
      const filtered = evaluations.filter(ev => currentAdminTab === 'pending' ? ev.status === 'Pending' : ev.status !== 'Pending');
      tbody.innerHTML = filtered.map(ev => `
        <tr>
          <td>${new Date(ev.createdAt).toLocaleDateString('ar-SA')}</td>
          <td>${ev.targetName}</td>
          <td>${ev.avgScore} / 5</td>
          <td>${ev.comment}</td>
          <td><span class="status-pill ${ev.status}">${ev.status}</span></td>
          <td class="actions-cell">
            <button class="btn-details" onclick="showEvalModal(${evaluations.indexOf(ev)})"><i class="fa-solid fa-eye"></i></button>
            ${ev.status === 'Pending' ? `<button class="btn-approve" onclick="updateStatus(${ev.id},'Approved')"><i class="fa-solid fa-check"></i></button>` : ''}
            <button class="btn-reject" onclick="deleteEvaluation(${ev.id})"><i class="fa-solid fa-trash"></i></button>
          </td>
        </tr>
      `).join('');
      document.getElementById('total-evals-count').textContent = evaluations.length;
      document.getElementById('pending-evals-count').textContent = evaluations.filter(e => e.status === 'Pending').length;
    }

    function renderPublicGrid() {
      const grid = document.getElementById('public-eval-grid');
      if (!grid) return;
      grid.innerHTML = evaluations.filter(e => e.status === 'Approved').map(ev => `<div class="card" style="margin-bottom:0"><h3>${ev.targetName}</h3><p>${ev.comment}</p><div style="margin-top:10px; font-size:12px; opacity:0.6">${ev.avgScore} / 5</div></div>`).join('');
    }

    async function loadUsers() {
      const res = await fetch(`${API}/users`);
      const data = await res.json();
      const tbody = document.getElementById('users-table-body');
      if (tbody) tbody.innerHTML = data.map(u => `<tr><td>${u.username}</td><td><select class="role-select-mini" onchange="updateUserRole(${u.id},this.value)"><option value="user" ${u.role==='user'?'selected':''}>User</option><option value="admin" ${u.role==='admin'?'selected':''}>Admin</option></select></td><td><select class="role-select-mini" onchange="updateUserAccess(${u.id},this.value)"><option value="0" ${u.canViewResults==0?'selected':''}>Hidden</option><option value="1" ${u.canViewResults==1?'selected':''}>Visible</option></select></td><td><button class="btn-reject" onclick="deleteUser(${u.id})"><i class="fa-solid fa-trash"></i></button></td></tr>`).join('');
    }

    async function updateUserRole(id, role) { await fetch(`${API}/users/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ role }) }); }
    async function updateUserAccess(id, access) { await fetch(`${API}/users/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ canViewResults: parseInt(access) }) }); }
    async function deleteUser(id) { if(confirm('حذف؟')) { await fetch(`${API}/users/${id}`, { method: 'DELETE' }); loadUsers(); } }

    async function loadEmployees() {
      const res = await fetch(`${API}/employees`);
      const data = await res.json();
      document.getElementById('employees-list').innerHTML = data.map(e => `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid rgba(255,255,255,0.05)"><span>${e.name}</span><button class="btn-reject" style="padding:2px 8px" onclick="deleteEmployee(${e.id})">حذف</button></div>`).join('');
    }
    async function addEmployee() {
      const name = document.getElementById('new-employee-name').value;
      if(!name) return;
      await fetch(`${API}/employees`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
      document.getElementById('new-employee-name').value = '';
      loadEmployees();
    }
    async function deleteEmployee(id) { await fetch(`${API}/employees/${id}`, { method: 'DELETE' }); loadEmployees(); }

    async function loadDepartments() {
      const res = await fetch(`${API}/departments`);
      const data = await res.json();
      document.getElementById('departments-list').innerHTML = data.map(d => `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid rgba(255,255,255,0.05)"><span>${d.name}</span><button class="btn-reject" style="padding:2px 8px" onclick="deleteDepartment(${d.id})">حذف</button></div>`).join('');
    }
    async function addDepartment() {
      const name = document.getElementById('new-department-name').value;
      if(!name) return;
      await fetch(`${API}/departments`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
      document.getElementById('new-department-name').value = '';
      loadDepartments();
    }
    async function deleteDepartment(id) { await fetch(`${API}/departments/${id}`, { method: 'DELETE' }); loadDepartments(); }

    async function loadQuestions() {
      const res = await fetch(`${API}/questions`);
      const data = await res.json();
      document.getElementById('questions-list').innerHTML = data.map(q => `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid rgba(255,255,255,0.05)"><span>${q.questionText} (${q.questionTextEn})</span><button class="btn-reject" onclick="deleteQuestion(${q.id})">حذف</button></div>`).join('');
      // Update dynamic form questions
      document.getElementById('dynamic-questions-container').innerHTML = data.map(q => `
        <div class="form-group" style="margin-bottom:15px">
          <label>${q.questionText}</label>
          <div style="display:flex; gap:10px; margin-top:5px;">
            ${[5,4,3,2,1].map(s => `<label style="cursor:pointer"><input type="radio" name="q-${q.id}" value="${s}"> ${s}</label>`).join('')}
          </div>
        </div>
      `).join('');
    }
    async function addQuestion() {
      const ar = document.getElementById('new-question-ar').value;
      const en = document.getElementById('new-question-en').value;
      if(!ar || !en) return;
      await fetch(`${API}/questions`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ questionText: ar, questionTextEn: en }) });
      document.getElementById('new-question-ar').value = '';
      document.getElementById('new-question-en').value = '';
      loadQuestions();
    }
    async function deleteQuestion(id) { await fetch(`${API}/questions/${id}`, { method: 'DELETE' }); loadQuestions(); }

    function logout() { sessionStorage.clear(); window.location.href = '../index.html'; }
    function showEvalModal(idx) {
      const ev = evaluations[idx];
      document.getElementById('modalTarget').textContent = ev.targetName;
      document.getElementById('modalComment').textContent = ev.comment;
      document.getElementById('evalModal').classList.add('show');
    }
    function closeEvalModal() { document.getElementById('evalModal').classList.remove('show'); }
    function switchAdminTab(t) {
      currentAdminTab = t;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(t==='pending'?'المعلقة':'المكتملة')));
      renderAdminTable();
    }
    function nextStep(s) {
      document.querySelectorAll('.form-step').forEach(el => el.classList.remove('active'));
      document.getElementById('step-' + s).classList.add('active');
      document.getElementById('form-progress').style.width = (s * 33.33) + '%';
    }
    async function updateEvalTargetUI() {
      const type = document.querySelector('input[name="eval-target"]:checked').value;
      const res = await fetch(`${API}/${type === 'employee' ? 'employees' : 'departments'}`);
      const data = await res.json();
      document.getElementById('target-dropdown').innerHTML = '<option value="">اختر...</option>' + data.map(i => `<option value="${i.name}">${i.name}</option>`).join('');
    }

    async function updateStatus(id, status) { await fetch(`${API}/evaluations/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status }) }); loadEvaluations(); }
    async function deleteEvaluation(id) { if(confirm('حذف؟')) { await fetch(`${API}/evaluations/${id}`, { method: 'DELETE' }); loadEvaluations(); } }

    async function submitEvaluation() {
      const target = document.getElementById('target-dropdown').value;
      const comment = document.getElementById('eval-comment').value;
      if(!target || !comment) { alert('يرجى ملء كافة البيانات'); return; }
      
      const res = await fetch(`${API}/evaluations`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          targetName: target,
          comment: comment,
          avgScore: 4, // Simplified for now
          submittedBy: currentUser.username,
          status: 'Pending'
        })
      });
      if(res.ok) { alert('تم إرسال التقييم بنجاح'); location.reload(); }
    }

    new Vue({
      el: '#step-3',
      data: { commentText: '' },
      computed: {
        eye() { let l = this.commentText.length; return { x: Math.min(l * 0.2, 5), y: Math.min(l * 0.1, 3) }; },
        facial() { let l = this.commentText.length; return { x: Math.min(l * 0.1, 3), y: Math.min(l * 0.05, 2) }; }
      }
    });
  </script>
</body>
</html>
